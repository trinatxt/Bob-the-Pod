<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trina Tan — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a2332;
    --ink-soft: #2e3f55;
    --paper: #f0eee9;
    --blue-deep: #1e3a5f;
    --blue-mid: #2e5f8a;
    --blue-pale: #a8c4dc;
    --blue-wash: #dce8f2;
    --border-mid: rgba(30,58,95,0.2);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: #c8cfd8;
    padding: 48px 20px;
  }

  .page {
    width: 794px;
    background: var(--paper);
    margin: 0 auto 40px;
    box-shadow: 0 4px 32px rgba(30,58,95,0.15);
  }

  /* ✅ FIX: IMAGE SYSTEM (Option 2) */
  .img-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid var(--border-mid);
    background: var(--blue-wash);
    position: relative;
  }

  .img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue-mid);
    background: var(--blue-wash);
  }
</style>
</head>

<body>

<!-- PAGE 3 EXAMPLE FIXED -->
<div class="page">

  <div style="padding:60px">

    <h2>Full-stack IoT system</h2>

    <!-- IMAGE GRID FIXED -->
    <div style="margin-top:28px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">

      <div class="img-frame">
        <img src="podfinal1.jpg" alt="Pod photo 1">
        <div class="img-placeholder">replace image if missing</div>
      </div>

      <div class="img-frame">
        <img src="podfinal2.png" alt="Pod photo 2">
        <div class="img-placeholder">replace image if missing</div>
      </div>

    </div>

    <!-- ITERATION IMAGE FIX -->
    <div style="margin-top:40px">

      <div style="margin-bottom:24px">
        <h3>Iteration 01</h3>
        <div class="img-frame">
          <img src="iter1.png" alt="iteration 1">
          <div class="img-placeholder">replace image</div>
        </div>
      </div>

      <div style="margin-bottom:24px">
        <h3>Final Build</h3>
        <div class="img-frame">
          <img src="iter3.png" alt="final build">
          <div class="img-placeholder">replace image</div>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
